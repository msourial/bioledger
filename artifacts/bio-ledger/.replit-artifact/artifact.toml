kind = "web"
previewPath = "/"
title = "Bio-Ledger"
version = "1.0.0"
id = "artifacts/bio-ledger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26258

[services.development]
run = "pnpm --filter @workspace/bio-ledger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bio-ledger", "run", "build" ]
publicDir = "artifacts/bio-ledger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26258"
BASE_PATH = "/"
